<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xりさーちつーる🦔</title>
<style>
  :root {
    --bg: #f7f7f8; --card: #fff; --border: #e3e3e6; --text: #1c1c1e; --sub: #6b6b70;
    --accent: #1d9bf0; --accent-dark: #1682c9; --danger: #e0245e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: .8rem 1rem; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 1.05rem; margin: 0 0 .6rem; text-align: center; }
  nav { display: flex; gap: .4rem; flex-wrap: wrap; justify-content: center; }
  nav button { border: 1px solid var(--border); background: var(--bg); color: var(--sub); padding: .45rem .9rem; border-radius: 999px; font-size: .85rem; cursor: pointer; }
  nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .backup { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; flex-wrap: wrap; }
  .backup button, .backup label { font-size: .75rem; color: var(--sub); background: none; border: 1px solid var(--border); padding: .3rem .6rem; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .backup-note { flex: 1; font-size: .72rem; color: var(--sub); line-height: 1.4; }
  main { max-width: 760px; margin: 0 auto; padding: 1rem; padding-bottom: 4rem; }
  section.tab { display: none; }
  section.tab.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: .9rem; }
  .card h3 { margin: 0 0 .5rem; font-size: .95rem; }
  form.entry-form { display: grid; gap: .5rem; }
  form.entry-form .row { display: flex; gap: .5rem; flex-wrap: wrap; }
  form.entry-form .row > * { flex: 1; min-width: 120px; }
  input, textarea, select { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: .5rem .6rem; font-size: .9rem; font-family: inherit; background: #fff; color: var(--text); }
  textarea { resize: vertical; min-height: 4.5rem; }
  label.chk { display: flex; align-items: center; gap: .4rem; font-size: .85rem; color: var(--sub); flex: 0 0 auto; }
  label.chk input { width: auto; }
  .actions { display: flex; gap: .5rem; justify-content: flex-end; }
  button.primary { background: var(--accent); color: #fff; border: none; padding: .55rem 1.1rem; border-radius: 6px; font-size: .9rem; cursor: pointer; font-weight: 600; }
  button.primary:hover { background: var(--accent-dark); }
  button.ghost { background: none; border: 1px solid var(--border); color: var(--sub); padding: .4rem .8rem; border-radius: 6px; cursor: pointer; font-size: .82rem; }
  button.ghost.danger { color: var(--danger); border-color: #f3c1cf; }
  .filters { display: flex; gap: .5rem; margin-bottom: .7rem; flex-wrap: wrap; }
  .filters input, .filters select { width: auto; flex: 1; min-width: 140px; }
  .list-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .8rem .9rem; margin-bottom: .6rem; }
  .list-item .meta { display: flex; justify-content: space-between; align-items: center; font-size: .78rem; color: var(--sub); margin-bottom: .35rem; flex-wrap: wrap; gap: .3rem; }
  .list-item .body { white-space: pre-wrap; font-size: .9rem; line-height: 1.5; margin-bottom: .5rem; }
  .tag-pill { display: inline-flex; align-items: center; gap: .3rem; background: #eef6fd; color: var(--accent-dark); border-radius: 999px; padding: .1rem .3rem .1rem .55rem; font-size: .74rem; margin: 0 .25rem .25rem 0; }
  .tag-pill button { background: none; border: none; color: inherit; cursor: pointer; padding: 0; font-size: .8rem; line-height: 1; opacity: .6; }
  .tag-pill button:hover { opacity: 1; }
  .tag-row { display: flex; flex-wrap: wrap; align-items: center; margin-bottom: .5rem; }
  .tag-suggest-row { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .5rem; }
  .tag-suggest { background: none; border: 1px dashed #c7dcee; color: var(--accent-dark); border-radius: 999px; padding: .1rem .6rem; font-size: .74rem; cursor: pointer; }
  .tag-suggest:hover { background: #eef6fd; }
  .post-comment { border: 1px dashed var(--border); background: #fffdf5; min-height: 3rem; font-size: .82rem; margin-bottom: .6rem; }
  .comment-block { background: #fffdf5; border: 1px dashed #e8dcb0; border-radius: 8px; padding: .5rem .6rem; font-size: .82rem; color: #7a6a2a; white-space: pre-wrap; margin-top: .4rem; }
  .item-actions { display: flex; gap: .4rem; justify-content: flex-end; }
  .empty { color: var(--sub); font-size: .85rem; text-align: center; padding: 1.5rem 0; }
  .tag-manage-item { display: flex; justify-content: space-between; align-items: center; padding: .5rem .2rem; border-bottom: 1px solid var(--border); font-size: .88rem; }
  .tag-manage-item:last-child { border-bottom: none; }
  .tag-count { color: var(--sub); font-size: .78rem; }
  .facet-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .5rem; margin-bottom: .6rem; }
  .facet-head h3 { margin: 0; }
  .facet-actions { display: flex; gap: .4rem; }
  .facet-actions button { font-size: .75rem; padding: .3rem .6rem; }
  .chip-row { display: flex; flex-wrap: wrap; gap: .4rem; }
  .chip { background: var(--bg); border: 1px solid var(--border); color: var(--sub); border-radius: 999px; padding: .3rem .8rem; font-size: .8rem; cursor: pointer; }
  .chip.chip-active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  a { color: var(--accent-dark); }
</style>
</head>
<body>

<header>
  <h1>Xりさーちつーる🦔</h1>
  <nav id="tabNav"></nav>
  <div class="backup">
    <span class="backup-note">データはこのブラウザのlocalStorageにのみ保存されます。端末・ブラウザを変えたら「エクスポート」→別環境で「インポート」で引き継いでください。</span>
    <button id="exportBtn">⬇ 全データJSONエクスポート</button>
    <label for="importFile">⬆ インポート
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </label>
    <button id="clearBtn" style="color:var(--danger)">全消去</button>
  </div>
</header>

<main>

  <section class="tab" data-tab="x">
    <div class="card">
      <h3>投稿を追加</h3>
      <form class="entry-form" id="postForm">
        <input type="url" id="postUrl" placeholder="投稿URL（貼るとアカウント名を自動取得）">
        <textarea id="postText" placeholder="投稿本文を貼り付け" style="min-height:12rem"></textarea>
        <div class="actions">
          <button type="button" class="ghost" id="postCancelEdit" style="display:none">編集キャンセル</button>
          <button type="submit" class="primary">追加</button>
        </div>
      </form>
    </div>
    <div class="filters">
      <input type="text" id="postFilterText" placeholder="本文・アカウントで検索">
      <select id="postFilterTag"><option value="">タグで絞り込み（全て）</option></select>
    </div>
    <div id="postList"></div>
  </section>

  <section class="tab" data-tab="memo">
    <div class="card">
      <h3>メモを追加</h3>
      <form class="entry-form" id="memoForm">
        <input type="text" id="memoTitle" placeholder="タイトル（例: 分析プロンプト）">
        <textarea id="memoContent" placeholder="内容" style="min-height:8rem"></textarea>
        <div class="actions">
          <button type="button" class="ghost" id="memoCancelEdit" style="display:none">編集キャンセル</button>
          <button type="submit" class="primary">追加</button>
        </div>
      </form>
    </div>
    <div class="filters">
      <input type="text" id="memoFilterText" placeholder="タイトル・内容で検索">
    </div>
    <div id="memoList"></div>
  </section>

  <section class="tab" data-tab="tag">
    <div class="card">
      <h3>タグ辞書</h3>
      <p style="color:var(--sub); font-size:.85rem; margin:0 0 .7rem">Xタブの投稿で使われているタグの一覧。ここで直接タグを新規登録することもできる（使い回す前提のタグを先に用意したいとき用）。</p>
      <form class="entry-form" id="tagForm">
        <div class="row">
          <input type="text" id="tagName" placeholder="新しいタグ名">
          <button type="submit" class="primary" style="flex:0 0 auto">追加</button>
        </div>
      </form>
    </div>
    <div id="tagList"></div>
  </section>

  <section class="tab" data-tab="research">
    <p style="color:var(--sub); font-size:.85rem; margin:.2rem 0 .8rem">Xタブに入力した投稿を、アカウント・タグで絞り込んで出力する場所。該当する投稿をまとめてコピーしてAIに渡せる。</p>
    <div class="card">
      <div class="facet-head">
        <h3>アカウントで絞り込み</h3>
        <div class="facet-actions">
          <button type="button" class="ghost" id="accSelectAll">全選択</button>
          <button type="button" class="ghost" id="accSelectNone">全解除</button>
        </div>
      </div>
      <div class="chip-row" id="accountChips"></div>
    </div>
    <div class="card">
      <div class="facet-head">
        <h3>タグで絞り込み</h3>
        <div class="facet-actions">
          <button type="button" class="ghost" id="tagSelectAll">全選択</button>
          <button type="button" class="ghost" id="tagSelectNone">全解除</button>
        </div>
      </div>
      <div class="chip-row" id="tagChips"></div>
    </div>
    <div class="card">
      <div class="facet-head">
        <h3>該当する投稿（<span id="matchCount">0</span>件）</h3>
        <button type="button" class="primary" id="copyMatchedBtn">📋 クリップボードにコピー</button>
      </div>
    </div>
    <div id="researchList"></div>
  </section>

</main>


<script>
(function () {
  "use strict";

  const STORAGE_KEY = "xConsulToolData";
  const TABS = [
    { id: "x", label: "X" },
    { id: "memo", label: "メモ" },
    { id: "tag", label: "タグ" },
    { id: "research", label: "リサーチ" },
  ];

  function emptyState() {
    return { version: 1, posts: [], memos: [], tags: [] };
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return emptyState();
      const parsed = JSON.parse(raw);
      return Object.assign(emptyState(), parsed);
    } catch (e) {
      console.error("load failed", e);
      return emptyState();
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = load();
  let editingPostId = null;
  let editingMemoId = null;
  let selectedAccounts = new Set();
  let selectedTags = new Set();
  let knownAccounts = new Set();
  let knownTags = new Set();

  const uid = () => Date.now().toString() + Math.floor(Math.random() * 1000);
  const todayStr = () => new Date().toISOString().slice(0, 10);

  function parseTags(str) {
    return str.split(",").map(s => s.trim()).filter(Boolean);
  }

  function registerTags(tagArr) {
    tagArr.forEach(t => {
      if (!state.tags.includes(t)) state.tags.push(t);
    });
  }

  function extractAccountFromUrl(url) {
    const m = url.match(/x\.com\/([^/?]+)/) || url.match(/twitter\.com\/([^/?]+)/);
    return m ? m[1] : "";
  }

  function fmtDate(d) {
    if (!d) return "";
    return d;
  }

  // ---------- tabs ----------
  function renderNav() {
    const nav = document.getElementById("tabNav");
    nav.innerHTML = "";
    TABS.forEach(t => {
      const btn = document.createElement("button");
      btn.textContent = t.label;
      btn.dataset.tab = t.id;
      btn.addEventListener("click", () => switchTab(t.id));
      nav.appendChild(btn);
    });
  }

  function switchTab(id) {
    document.querySelectorAll("nav#tabNav button").forEach(b => b.classList.toggle("active", b.dataset.tab === id));
    document.querySelectorAll("section.tab").forEach(s => s.classList.toggle("active", s.dataset.tab === id));
    localStorage.setItem("xConsulToolActiveTab", id);
  }

  // ---------- X (posts) ----------
  function renderPostTagFilter() {
    const sel = document.getElementById("postFilterTag");
    const current = sel.value;
    sel.innerHTML = '<option value="">タグで絞り込み（全て）</option>';
    state.tags.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t; opt.textContent = t;
      sel.appendChild(opt);
    });
    sel.value = current;
  }

  function renderPosts() {
    renderPostTagFilter();
    const list = document.getElementById("postList");
    const textFilter = document.getElementById("postFilterText").value.trim().toLowerCase();
    const tagFilter = document.getElementById("postFilterTag").value;
    let posts = [...state.posts].sort((a, b) => (b.date || "").localeCompare(a.date || "") || b.id.localeCompare(a.id));
    if (textFilter) {
      posts = posts.filter(p =>
        (p.rawText || "").toLowerCase().includes(textFilter) ||
        (p.accountId || "").toLowerCase().includes(textFilter)
      );
    }
    if (tagFilter) posts = posts.filter(p => (p.tags || []).includes(tagFilter));

    if (!posts.length) {
      list.innerHTML = '<div class="empty">まだ投稿がありません</div>';
      return;
    }
    list.innerHTML = "";
    posts.forEach(p => {
      const el = document.createElement("div");
      el.className = "list-item";
      el.innerHTML = `
        <div class="meta">
          <span>${p.accountId ? "@" + escapeHtml(p.accountId) : "アカウント不明"} ・ ${escapeHtml(fmtDate(p.date))}</span>
        </div>
        <div class="body">${escapeHtml(p.rawText || "")}</div>
        ${p.url ? `<div style="margin-bottom:.5rem"><a href="${escapeAttr(p.url)}" target="_blank" rel="noopener">元投稿を開く ↗</a></div>` : ""}
        <div class="tag-row">
          ${(p.tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}<button data-action="remove-post-tag" data-id="${p.id}" data-tag="${escapeAttr(t)}">×</button></span>`).join("")}
        </div>
        ${state.tags.filter(t => !(p.tags || []).includes(t)).length ? `
        <div class="tag-suggest-row">
          ${state.tags.filter(t => !(p.tags || []).includes(t)).map(t => `<button type="button" class="tag-suggest" data-action="add-post-tag" data-id="${p.id}" data-tag="${escapeAttr(t)}">+ ${escapeHtml(t)}</button>`).join("")}
        </div>` : ""}
        <textarea class="post-comment" data-id="${p.id}" placeholder="コメント（バズった理由など・任意）">${escapeHtml(p.comment || "")}</textarea>
        <div class="item-actions">
          <button class="ghost" data-action="edit-post" data-id="${p.id}">編集</button>
          <button class="ghost danger" data-action="delete-post" data-id="${p.id}">削除</button>
        </div>
      `;
      list.appendChild(el);
    });
    renderResearch();
  }

  document.getElementById("postForm").addEventListener("submit", e => {
    e.preventDefault();
    const rawText = document.getElementById("postText").value.trim();
    if (!rawText) { alert("投稿本文を入力してください"); return; }
    const url = document.getElementById("postUrl").value.trim();
    const accountId = extractAccountFromUrl(url);
    if (editingPostId) {
      const idx = state.posts.findIndex(p => p.id === editingPostId);
      if (idx !== -1) Object.assign(state.posts[idx], { url, rawText, accountId });
      editingPostId = null;
      document.getElementById("postCancelEdit").style.display = "none";
    } else {
      state.posts.push({ id: uid(), url, rawText, accountId, date: todayStr(), tags: [] });
    }
    save();
    e.target.reset();
    renderPosts();
  });

  document.getElementById("postCancelEdit").addEventListener("click", () => {
    editingPostId = null;
    document.getElementById("postForm").reset();
    document.getElementById("postCancelEdit").style.display = "none";
  });

  document.getElementById("postList").addEventListener("click", e => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === "delete-post") {
      if (!confirm("この投稿を削除しますか？")) return;
      state.posts = state.posts.filter(p => p.id !== id);
      save(); renderPosts();
    } else if (btn.dataset.action === "edit-post") {
      const p = state.posts.find(p => p.id === id);
      if (!p) return;
      editingPostId = id;
      document.getElementById("postUrl").value = p.url || "";
      document.getElementById("postText").value = p.rawText || "";
      document.getElementById("postCancelEdit").style.display = "inline-block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else if (btn.dataset.action === "remove-post-tag") {
      const p = state.posts.find(p => p.id === id);
      if (!p) return;
      p.tags = (p.tags || []).filter(t => t !== btn.dataset.tag);
      save(); renderPosts();
    } else if (btn.dataset.action === "add-post-tag") {
      const p = state.posts.find(p => p.id === id);
      if (!p) return;
      p.tags = p.tags || [];
      if (!p.tags.includes(btn.dataset.tag)) p.tags.push(btn.dataset.tag);
      save(); renderPosts();
    }
  });

  document.getElementById("postList").addEventListener("focusout", e => {
    if (!e.target.classList.contains("post-comment")) return;
    const p = state.posts.find(p => p.id === e.target.dataset.id);
    if (!p) return;
    p.comment = e.target.value;
    save();
  });

  document.getElementById("postFilterText").addEventListener("input", renderPosts);
  document.getElementById("postFilterTag").addEventListener("change", renderPosts);

  // ---------- Memo ----------
  function renderMemos() {
    const list = document.getElementById("memoList");
    const textFilter = document.getElementById("memoFilterText").value.trim().toLowerCase();
    let memos = [...state.memos].sort((a, b) => b.id.localeCompare(a.id));
    if (textFilter) {
      memos = memos.filter(m =>
        (m.title || "").toLowerCase().includes(textFilter) ||
        (m.content || "").toLowerCase().includes(textFilter)
      );
    }
    if (!memos.length) {
      list.innerHTML = '<div class="empty">まだメモがありません</div>';
      return;
    }
    list.innerHTML = "";
    memos.forEach(m => {
      const el = document.createElement("div");
      el.className = "list-item";
      el.innerHTML = `
        <div class="meta"><strong style="color:var(--text); font-size:.92rem">${escapeHtml(m.title || "（無題）")}</strong></div>
        <div class="body">${escapeHtml(m.content || "")}</div>
        <div class="item-actions">
          <button class="ghost" data-action="copy-memo-with-research" data-id="${m.id}">📋 リサーチ結果を付けてコピー</button>
          <button class="ghost" data-action="edit-memo" data-id="${m.id}">編集</button>
          <button class="ghost danger" data-action="delete-memo" data-id="${m.id}">削除</button>
        </div>
      `;
      list.appendChild(el);
    });
  }

  document.getElementById("memoForm").addEventListener("submit", e => {
    e.preventDefault();
    const content = document.getElementById("memoContent").value.trim();
    if (!content) { alert("内容を入力してください"); return; }
    const data = {
      title: document.getElementById("memoTitle").value.trim(),
      content,
    };
    if (editingMemoId) {
      const idx = state.memos.findIndex(m => m.id === editingMemoId);
      if (idx !== -1) state.memos[idx] = Object.assign(state.memos[idx], data);
      editingMemoId = null;
      document.getElementById("memoCancelEdit").style.display = "none";
    } else {
      state.memos.push(Object.assign({ id: uid() }, data));
    }
    save();
    e.target.reset();
    renderMemos();
  });

  document.getElementById("memoCancelEdit").addEventListener("click", () => {
    editingMemoId = null;
    document.getElementById("memoForm").reset();
    document.getElementById("memoCancelEdit").style.display = "none";
  });

  document.getElementById("memoList").addEventListener("click", async e => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === "delete-memo") {
      if (!confirm("このメモを削除しますか？")) return;
      state.memos = state.memos.filter(m => m.id !== id);
      save(); renderMemos();
    } else if (btn.dataset.action === "edit-memo") {
      const m = state.memos.find(m => m.id === id);
      if (!m) return;
      editingMemoId = id;
      document.getElementById("memoTitle").value = m.title || "";
      document.getElementById("memoContent").value = m.content || "";
      document.getElementById("memoCancelEdit").style.display = "inline-block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else if (btn.dataset.action === "copy-memo-with-research") {
      const m = state.memos.find(m => m.id === id);
      if (!m) return;
      const researchText = buildResearchText();
      if (!researchText) alert("リサーチタブで該当する投稿がありません。プロンプトのみコピーします。");
      const combined = researchText ? `${m.content}\n\n${researchText}` : m.content;
      await copyToClipboard(combined);
      flashButton(btn, "✓ コピーしました");
    }
  });

  document.getElementById("memoFilterText").addEventListener("input", renderMemos);

  // ---------- Tag dictionary ----------
  function tagUsageCount(tag) {
    return state.posts.filter(p => (p.tags || []).includes(tag)).length;
  }

  function renderTags() {
    const list = document.getElementById("tagList");
    if (!state.tags.length) {
      list.innerHTML = '<div class="empty">まだタグがありません</div>';
      return;
    }
    const sorted = [...state.tags].sort((a, b) => a.localeCompare(b, "ja"));
    list.innerHTML = '<div class="card"></div>';
    const card = list.querySelector(".card");
    sorted.forEach(t => {
      const row = document.createElement("div");
      row.className = "tag-manage-item";
      row.innerHTML = `
        <span>${escapeHtml(t)}</span>
        <span>
          <span class="tag-count">使用 ${tagUsageCount(t)}件</span>
          <button class="ghost danger" style="margin-left:.5rem" data-action="delete-tag" data-tag="${escapeAttr(t)}">削除</button>
        </span>
      `;
      card.appendChild(row);
    });
  }

  document.getElementById("tagForm").addEventListener("submit", e => {
    e.preventDefault();
    const input = document.getElementById("tagName");
    const name = input.value.trim();
    if (!name) return;
    if (!state.tags.includes(name)) state.tags.push(name);
    save();
    input.value = "";
    renderTags();
    renderPosts();
  });

  document.getElementById("tagList").addEventListener("click", e => {
    const btn = e.target.closest("button[data-action='delete-tag']");
    if (!btn) return;
    const tag = btn.dataset.tag;
    const count = tagUsageCount(tag);
    const msg = count > 0
      ? `「${tag}」はXタブの投稿で${count}件使われています。タグ辞書から削除しても各投稿に付いたタグ自体は残ります。削除しますか？`
      : `「${tag}」を削除しますか？`;
    if (!confirm(msg)) return;
    state.tags = state.tags.filter(t => t !== tag);
    save();
    renderTags();
    renderPosts();
  });

  // ---------- Research (Xタブのデータをアカウント・タグで絞り込んで出力) ----------
  function getPostAccounts() {
    const set = new Set(state.posts.map(p => p.accountId || "(不明)"));
    return [...set].sort((a, b) => a.localeCompare(b, "ja"));
  }

  function getPostTagValues() {
    const set = new Set();
    state.posts.forEach(p => {
      if (p.tags && p.tags.length) p.tags.forEach(t => set.add(t));
      else set.add("(タグなし)");
    });
    return [...set].sort((a, b) => a.localeCompare(b, "ja"));
  }

  function syncFacetKnown(known, selected, current) {
    current.forEach(v => {
      if (!known.has(v)) {
        known.add(v);
        selected.add(v);
      }
    });
  }

  function computeMatchedPosts() {
    return state.posts.filter(p => {
      const acc = p.accountId || "(不明)";
      if (!selectedAccounts.has(acc)) return false;
      const tags = (p.tags && p.tags.length) ? p.tags : ["(タグなし)"];
      return tags.some(t => selectedTags.has(t));
    });
  }

  function renderChipRow(containerId, values, selectedSet, kind) {
    const container = document.getElementById(containerId);
    if (!values.length) {
      container.innerHTML = '<span class="empty" style="padding:0">Xタブに投稿がありません</span>';
      return;
    }
    container.innerHTML = "";
    values.forEach(v => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "chip" + (selectedSet.has(v) ? " chip-active" : "");
      btn.textContent = v;
      btn.dataset.kind = kind;
      btn.dataset.value = v;
      container.appendChild(btn);
    });
  }

  function renderResearch() {
    const allAccounts = getPostAccounts();
    const allTags = getPostTagValues();
    syncFacetKnown(knownAccounts, selectedAccounts, allAccounts);
    syncFacetKnown(knownTags, selectedTags, allTags);

    renderChipRow("accountChips", allAccounts, selectedAccounts, "account");
    renderChipRow("tagChips", allTags, selectedTags, "tag");

    const matched = computeMatchedPosts().sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    document.getElementById("matchCount").textContent = matched.length;

    const list = document.getElementById("researchList");
    if (!matched.length) {
      list.innerHTML = '<div class="empty">条件に合う投稿がありません</div>';
      return;
    }
    list.innerHTML = "";
    matched.forEach(p => {
      const el = document.createElement("div");
      el.className = "list-item";
      el.innerHTML = `
        <div class="meta"><span>${p.accountId ? "@" + escapeHtml(p.accountId) : "アカウント不明"} ・ ${escapeHtml(fmtDate(p.date))}</span></div>
        <div class="body">${escapeHtml(p.rawText || "")}</div>
        ${p.comment && p.comment.trim() ? `<div class="comment-block">💬 ${escapeHtml(p.comment.trim())}</div>` : ""}
        <div>${(p.tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join("")}</div>
      `;
      list.appendChild(el);
    });
  }

  function buildResearchText() {
    const matched = computeMatchedPosts().sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    if (!matched.length) return "";
    return matched.map(p => {
      const acc = p.accountId ? "@" + p.accountId : "アカウント不明";
      const tags = (p.tags || []).join(", ");
      let block = `--- ${acc}（${p.date || "日付不明"}）${tags ? "[" + tags + "]" : ""} ---\n【本文】\n${p.rawText || ""}`;
      if (p.comment && p.comment.trim()) block += `\n【コメント】\n${p.comment.trim()}`;
      return block;
    }).join("\n\n");
  }

  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
    } catch (err) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
  }

  function flashButton(btn, label) {
    const original = btn.textContent;
    btn.textContent = label || "✓ コピーしました";
    setTimeout(() => { btn.textContent = original; }, 1500);
  }

  function toggleChip(kind, value) {
    const set = kind === "account" ? selectedAccounts : selectedTags;
    if (set.has(value)) set.delete(value); else set.add(value);
    renderResearch();
  }

  document.getElementById("accountChips").addEventListener("click", e => {
    const btn = e.target.closest("button.chip");
    if (btn) toggleChip("account", btn.dataset.value);
  });
  document.getElementById("tagChips").addEventListener("click", e => {
    const btn = e.target.closest("button.chip");
    if (btn) toggleChip("tag", btn.dataset.value);
  });
  document.getElementById("accSelectAll").addEventListener("click", () => { selectedAccounts = new Set(getPostAccounts()); renderResearch(); });
  document.getElementById("accSelectNone").addEventListener("click", () => { selectedAccounts = new Set(); renderResearch(); });
  document.getElementById("tagSelectAll").addEventListener("click", () => { selectedTags = new Set(getPostTagValues()); renderResearch(); });
  document.getElementById("tagSelectNone").addEventListener("click", () => { selectedTags = new Set(); renderResearch(); });

  document.getElementById("copyMatchedBtn").addEventListener("click", async () => {
    const text = buildResearchText();
    if (!text) { alert("該当する投稿がありません"); return; }
    await copyToClipboard(text);
    flashButton(document.getElementById("copyMatchedBtn"));
  });

  // ---------- backup ----------
  document.getElementById("exportBtn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0, 10);
    a.href = URL.createObjectURL(blob);
    a.download = `xconsul-backup-${stamp}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById("importFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!confirm("インポートすると現在のデータは上書きされます。続けますか？")) return;
        state = Object.assign(emptyState(), parsed);
        save();
        renderAll();
      } catch (err) {
        alert("JSONの読み込みに失敗しました: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    if (!confirm("全データを消去します。事前にエクスポートしましたか？本当に消去しますか？")) return;
    state = emptyState();
    save();
    renderAll();
  });

  // ---------- utils ----------
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function escapeAttr(str) { return escapeHtml(str); }

  function renderAll() {
    renderPosts();
    renderMemos();
    renderTags();
    renderResearch();
  }

  // ---------- init ----------
  renderNav();
  const savedTab = localStorage.getItem("xConsulToolActiveTab") || "x";
  switchTab(TABS.some(t => t.id === savedTab) ? savedTab : "x");
  renderAll();
})();
</script>
</body>
</html>
